spring:
  application:
    name: smart-document-qa
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /

# OpenAI Configuration
openai:
  api:
    key: ${OPENAI_API_KEY:}
  model: gpt-3.5-turbo

# Claude Configuration  
claude:
  api:
    key: ${CLAUDE_API_KEY:}
  model: claude-3-sonnet-20240229

# LLM Configuration
llm:
  model: claude-3-sonnet-20240229
  timeout-seconds: 30
  retry-attempts: 3
  retry-delay-ms: 2000

# Logging
logging:
  level:
    root: INFO
    com.smartqa: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 10

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
